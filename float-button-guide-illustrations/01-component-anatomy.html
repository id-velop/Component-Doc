<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1.1 组件构成 - 悬浮按钮解剖图</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.22.6/dist/reset.min.css">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/antd@5.22.6/dist/antd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5/dist/index.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f8fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .canvas-root { width: 960px; margin: 0 auto; padding: 40px; }
  .section-title { font-size: 20px; font-weight: 600; color: #1d2129; margin-bottom: 8px; }
  .section-desc { font-size: 14px; color: #86909c; margin-bottom: 32px; }
  .anatomy-wrapper { display: flex; align-items: center; justify-content: center; gap: 80px; background: #fff; border-radius: 12px; padding: 48px 40px; border: 1px solid #e5e6eb; }
  .anatomy-item { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .anatomy-label { font-size: 13px; color: #4e5969; font-weight: 500; text-align: center; }
  .annotation-group { position: relative; }
  .annotation-line { position: absolute; }
  .annotation-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500;
    white-space: nowrap;
  }
  .tag-container { background: #e8f3ff; color: #165dff; border: 1px solid #bedaff; }
  .tag-icon { background: #e8f7ea; color: #00b42a; border: 1px solid #aff0b5; }
  .tag-text { background: #fff7e8; color: #ff7d00; border: 1px solid #ffe4ba; }
  .tag-number { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: 600; color: #fff; }
  .num-1 { background: #165dff; }
  .num-2 { background: #00b42a; }
  .num-3 { background: #ff7d00; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { FloatButton, Badge, ConfigProvider } = antd;
const { QuestionCircleOutlined, CustomerServiceOutlined, CommentOutlined } = icons;

function AnatomyDiagram() {
  return (
    <ConfigProvider theme={{ token: { colorPrimary: '#165dff' } }}>
      <div className="canvas-root">
        <div className="section-title">1.1 组件构成</div>
        <div className="section-desc">悬浮按钮由容器、图标、可选文字描述三个基础要素构成</div>

        <div className="anatomy-wrapper">
          {/* Circle button anatomy */}
          <div className="anatomy-item">
            <div className="anatomy-label">圆形悬浮按钮（默认）</div>
            <div style={{ position: 'relative', width: 200, height: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {/* Simulated FloatButton */}
              <div style={{
                width: 48, height: 48, borderRadius: '50%', background: '#fff',
                boxShadow: '0 6px 16px 0 rgba(0,0,0,0.08), 0 3px 6px -4px rgba(0,0,0,0.12), 0 9px 28px 8px rgba(0,0,0,0.05)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                border: '1px solid #f0f0f0', cursor: 'pointer', position: 'relative', zIndex: 2,
              }}>
                <QuestionCircleOutlined style={{ fontSize: 20, color: 'rgba(0,0,0,0.88)' }} />
              </div>
              {/* Container annotation */}
              <div style={{ position: 'absolute', top: 20, right: -10 }}>
                <svg width="80" height="60" style={{ position: 'absolute', top: 12, left: -40 }}>
                  <line x1="40" y1="48" x2="70" y2="8" stroke="#165dff" strokeWidth="1.5" strokeDasharray="4 2" />
                  <circle cx="40" cy="48" r="2.5" fill="#165dff" />
                </svg>
                <div className="annotation-tag tag-container" style={{ position: 'relative', left: 20, top: -8 }}>
                  <span className="tag-number num-1">1</span> 容器
                </div>
              </div>
              {/* Icon annotation */}
              <div style={{ position: 'absolute', bottom: 16, left: -16 }}>
                <svg width="80" height="60" style={{ position: 'absolute', bottom: 20, right: -20 }}>
                  <line x1="60" y1="12" x2="20" y2="50" stroke="#00b42a" strokeWidth="1.5" strokeDasharray="4 2" />
                  <circle cx="60" cy="12" r="2.5" fill="#00b42a" />
                </svg>
                <div className="annotation-tag tag-icon" style={{ position: 'relative', left: -40, top: 44 }}>
                  <span className="tag-number num-2">2</span> 图标
                </div>
              </div>
            </div>
          </div>

          {/* Divider */}
          <div style={{ width: 1, height: 200, background: '#e5e6eb' }} />

          {/* Square button anatomy */}
          <div className="anatomy-item">
            <div className="anatomy-label">方形悬浮按钮（带文字）</div>
            <div style={{ position: 'relative', width: 240, height: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {/* Simulated Square FloatButton */}
              <div style={{
                width: 48, height: 'auto', minHeight: 48, borderRadius: 8, background: '#fff',
                boxShadow: '0 6px 16px 0 rgba(0,0,0,0.08), 0 3px 6px -4px rgba(0,0,0,0.12), 0 9px 28px 8px rgba(0,0,0,0.05)',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                padding: '8px 4px', gap: 2, border: '1px solid #f0f0f0', cursor: 'pointer', position: 'relative', zIndex: 2,
              }}>
                <CommentOutlined style={{ fontSize: 20, color: 'rgba(0,0,0,0.88)' }} />
                <span style={{ fontSize: 11, color: 'rgba(0,0,0,0.88)', lineHeight: 1.2 }}>反馈</span>
              </div>
              {/* Container annotation */}
              <div style={{ position: 'absolute', top: 14, right: 4 }}>
                <svg width="80" height="60" style={{ position: 'absolute', top: 16, left: -30 }}>
                  <line x1="30" y1="48" x2="68" y2="8" stroke="#165dff" strokeWidth="1.5" strokeDasharray="4 2" />
                  <circle cx="30" cy="48" r="2.5" fill="#165dff" />
                </svg>
                <div className="annotation-tag tag-container" style={{ position: 'relative', left: 30, top: -4 }}>
                  <span className="tag-number num-1">1</span> 容器
                </div>
              </div>
              {/* Icon annotation */}
              <div style={{ position: 'absolute', top: 60, left: -10 }}>
                <svg width="80" height="50" style={{ position: 'absolute', top: 0, right: 0 }}>
                  <line x1="68" y1="12" x2="20" y2="20" stroke="#00b42a" strokeWidth="1.5" strokeDasharray="4 2" />
                  <circle cx="68" cy="12" r="2.5" fill="#00b42a" />
                </svg>
                <div className="annotation-tag tag-icon" style={{ position: 'relative', left: -50, top: 6 }}>
                  <span className="tag-number num-2">2</span> 图标
                </div>
              </div>
              {/* Text annotation */}
              <div style={{ position: 'absolute', bottom: 24, left: 0 }}>
                <svg width="90" height="50" style={{ position: 'absolute', bottom: 14, right: -12 }}>
                  <line x1="72" y1="8" x2="24" y2="40" stroke="#ff7d00" strokeWidth="1.5" strokeDasharray="4 2" />
                  <circle cx="72" cy="8" r="2.5" fill="#ff7d00" />
                </svg>
                <div className="annotation-tag tag-text" style={{ position: 'relative', left: -62, top: 34 }}>
                  <span className="tag-number num-3">3</span> 文字描述（可选）
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Legend */}
        <div style={{ display: 'flex', gap: 24, marginTop: 20, justifyContent: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#86909c' }}>
            <span className="tag-number num-1" style={{ width: 16, height: 16, fontSize: 10 }}>1</span> 容器 — 定义点击区域与整体形态
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#86909c' }}>
            <span className="tag-number num-2" style={{ width: 16, height: 16, fontSize: 10 }}>2</span> 图标 — 表达操作语义（必填）
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#86909c' }}>
            <span className="tag-number num-3" style={{ width: 16, height: 16, fontSize: 10 }}>3</span> 文字描述 — 补充说明（仅方形支持）
          </div>
        </div>
      </div>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AnatomyDiagram />);
</script>
</body>
</html>
