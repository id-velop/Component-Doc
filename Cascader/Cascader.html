  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .compare-item { display: flex; flex-direction: column; }
  .compare-card { background: #fff; border-radius: 8px; flex: 1; padding: 20px; min-height: 120px; display: flex; align-items: center; justify-content: center; }

  .compare-bar.do { background: linear-gradient(90deg, #52c41a 0%, rgba(82,196,26,0.15) 100%); }
  .compare-bar.dont { background: linear-gradient(90deg, #ff4d4f 0%, rgba(255,77,79,0.15) 100%); }
  .compare-label { text-align: left; padding: 6px 0 0; font-size: 14px; font-weight: 700; }
  .compare-label.do { color: #52c41a; }
  .compare-label.dont { color: #ff4d4f; }
  .compare-desc { font-size: 13px; color: var(--text-2); padding: 2px 0 0; display: flex; align-items: flex-start; gap: 6px; }
  .compare-desc .anticon { flex-shrink: 0; margin-top: 2px; }

  .mock { background: #fafbfc; border-radius: 8px; border: 1px solid #e8e8e8; position: relative; padding: 14px; }
  .mock .ant-skeleton-title { height: 8px !important; margin-bottom: 12px !important; }
  .mock .ant-skeleton-paragraph > li { height: 5px !important; }

  .rec-block { margin: 8px 0 20px; padding: 10px 16px; border-radius: 6px; font-size: 13px; }
  .rec-block.good { background: #f6ffed; border-left: 3px solid #52c41a; }
  .rec-block.bad { background: #fff2f0; border-left: 3px solid #ff4d4f; }

/* ============ SVG FLOWCHART HELPERS ============ */
const FcRect = ({ x, y, w, h, text, fill = '#e6f0ff' }) => (
  <g>
    <rect x={x} y={y} width={w} height={h} rx={6} fill={fill} stroke="#2673dd" strokeWidth={1.5} />
    <text x={x + w / 2} y={y + h / 2 + 1} textAnchor="middle" dominantBaseline="central" fontSize={12} fill="#333" fontWeight={500}>{text}</text>
  </g>
);
const FcDiamond = ({ cx, cy, w, h, lines }) => {
  const pts = `${cx},${cy - h / 2} ${cx + w / 2},${cy} ${cx},${cy + h / 2} ${cx - w / 2},${cy}`;
  return (
    <g>
      <polygon points={pts} fill="#f0f5ff" stroke="#2673dd" strokeWidth={1.5} />
      {lines.map((line, i) => (
        <text key={i} x={cx} y={cy - ((lines.length - 1) * 7) + i * 14 + 1} textAnchor="middle" dominantBaseline="central" fontSize={11} fill="#333" fontWeight={500}>{line}</text>
      ))}
    </g>
  );
};
const FcResult = ({ x, y, w, h, text }) => (
  <g>
    <rect x={x} y={y} width={w} height={h} rx={14} fill="#2673dd" stroke="#2673dd" strokeWidth={1.5} />
    <text x={x + w / 2} y={y + h / 2 + 1} textAnchor="middle" dominantBaseline="central" fontSize={11} fill="#fff" fontWeight={600}>{text}</text>
  </g>
);
const Arrow = ({ x1, y1, x2, y2 }) => (

function App() {
  const [basicValue, setBasicValue] = React.useState(['zhejiang', 'hangzhou', 'xihu']);

        <h1>Cascader 级联选择</h1>
        <p className="subtitle">
          在 SPACE 项目中引用：<code>import {'{ Cascader }'} from 'infrad';</code>
        </p>

        {/* ======== 1. 简洁易读部份 ======== */}
        <h2>1. 简洁易读部份</h2>

        <h3>1.0 组件描述</h3>
        <p>级联选择组件用于从一组具有层级关系的数据中进行选择，可在同一浮层内逐级展开并完成选择。适用于省市区、组织架构、分类目录等具有父子层级的数据结构，相比 Select 能在同一弹层中完成多级选择，体验更连贯。</p>

        <h3>1.1 组件构成</h3>
        <p>级联选择由以下基础要素构成，可按需组合使用：</p>

        <Illus>
          <AnatomySVG />
        </Illus>

        <div className="indent">
          <p><strong>1. 触发器</strong> — 展示当前选中结果或占位提示，点击后展开下拉浮层；可自定义为按钮或其它样式。</p>
          <p><strong>2. 下拉浮层</strong> — 承载多级选项的展开区域，可配置弹出位置与宽度。</p>
          <p><strong>3. 多列菜单</strong> — 每级选项占据一列，选择父级后展开子级，形成级联关系。</p>

        <h3>3.1 多操作的展示与折叠策略</h3>

        <ul>

          <li><strong>多列宽度</strong>：级联每列宽度需保证选项文本完整展示，列数过多时考虑横向滚动或限制展示列数。</li>

        <ul>

          <li><strong>禁用选项</strong>：通过数据源中的 <code>disabled</code> 标记可禁用某些节点，用户无法选择该节点；适用于「存在但不能选」的配置。</li>

        <ul>
          <li><strong>表单内</strong>：作为表单项时，放在对应标签下方，与其它控件对齐；宽度与同表单其它输入控件协调。</li>
          <li><strong>筛选区</strong>：作为筛选条件时，放在筛选栏中，与其它筛选项统一排列规则。</li>
          <li><strong>侧边栏 / 固定面板</strong>：使用面板模式时，放在侧边栏或固定配置区内，与周围区块对齐。</li>
        </ul>
        <Illus>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16 }}>
            {/* 表单 */}
            <div>
              <Text strong style={{ fontSize: 12, display: 'block', marginBottom: 8 }}>表单内</Text>
              <div className="mock" style={{ padding: 16 }}>
                <Form layout="vertical" size="small">
                  <Form.Item label="姓名" style={{ marginBottom: 10 }}>
                    <Input placeholder="请输入" defaultValue="张三" />
                  </Form.Item>
                  <Form.Item label="地区" style={{ marginBottom: 10 }}>
                    <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} style={{ width: '100%' }} size="small" />
                  </Form.Item>
                  <Form.Item label="地址" style={{ marginBottom: 0 }}>
                    <Input placeholder="请输入" />
                  </Form.Item>
                </Form>
              </div>
            </div>
            {/* 筛选区 */}
            <div>
              <Text strong style={{ fontSize: 12, display: 'block', marginBottom: 8 }}>筛选区</Text>
              <div className="mock" style={{ padding: 16 }}>
                <Space direction="vertical" size={8} style={{ width: '100%' }}>
                  <Input placeholder="关键词" size="small" />
                  <Cascader options={options} placeholder="地区" style={{ width: '100%' }} size="small" />
                  <DatePicker style={{ width: '100%' }} size="small" />
                  <Button type="primary" size="small" block>查询</Button>
                </Space>
              </div>
            </div>
            {/* 侧边栏 */}
            <div>
              <Text strong style={{ fontSize: 12, display: 'block', marginBottom: 8 }}>侧边栏面板</Text>
              <div className="mock" style={{ padding: 0 }}>
                <div style={{ padding: '8px 12px', borderBottom: '1px solid #e8e8e8', fontSize: 12, fontWeight: 600 }}>分类</div>
                <div style={{ padding: 2 }}>
                  <Cascader.Panel options={categoryOptions} style={{ width: '100%' }} />
                </div>
              </div>
            </div>
          </div>
        </Illus>

        <h3>3.4 顺序与对齐逻辑</h3>
        <ul>
          <li><strong>多筛选项</strong>：级联与其它筛选项按业务重要性或使用频率排列；常见顺序为「关键词 → 分类/级联 → 时间 → 其它」。</li>
          <li><strong>表单内</strong>：与同组表单项保持相同对齐方式（左对齐或网格对齐），标签与控件的对齐关系一致。</li>
        </ul>
        <Illus>
          <div className="mock" style={{ maxWidth: 800, padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, flexWrap: 'wrap' }}>
              <Space direction="vertical" size={2}>
                <Text type="secondary" style={{ fontSize: 11 }}>① 关键词</Text>
                <Input placeholder="搜索" style={{ width: 140 }} size="small" />
              </Space>
              <Space direction="vertical" size={2}>
                <Text type="secondary" style={{ fontSize: 11 }}>② 分类 / 级联</Text>
                <Cascader options={categoryOptions} placeholder="分类" style={{ width: 180 }} size="small" />
              </Space>
              <Space direction="vertical" size={2}>
                <Text type="secondary" style={{ fontSize: 11 }}>③ 地区</Text>
                <Cascader options={options} placeholder="地区" style={{ width: 180 }} size="small" />
              </Space>
              <Space direction="vertical" size={2}>
                <Text type="secondary" style={{ fontSize: 11 }}>④ 时间</Text>
                <DatePicker.RangePicker style={{ width: 200 }} size="small" />
              </Space>
              <Button type="primary" size="small">查询</Button>
            </div>
          </div>
        </Illus>

        <h3>3.5 状态与交互反馈</h3>
        <ul>
          <li><strong>默认</strong>：触发器展示占位文案或已选路径，边框与背景清晰。</li>
          <li><strong>展开</strong>：点击后浮层展开，首列选项展示；若有默认值，可高亮已选路径。</li>
          <li><strong>逐级选择</strong>：选择父级后子级列展开；选中项高亮，路径可追溯。</li>
          <li><strong>选择完成</strong>：选到有效节点后浮层关闭，触发器回填；多选时回填策略需符合业务预期。</li>
          <li><strong>禁用</strong>：触发器置灰，不可展开；或部分节点禁用，不可选。</li>
          <li><strong>错误 / 警告</strong>：校验失败时通过 <code>status</code> 或边框色、提示文案标明。</li>
        </ul>
        <Illus>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>默认态</Text>
              <Cascader options={options} placeholder="请选择" style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>已选中</Text>
              <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>禁用态</Text>
              <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} disabled style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>错误状态</Text>
              <Cascader options={options} placeholder="请选择" status="error" style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>警告状态</Text>
              <Cascader options={options} placeholder="请选择" status="warning" style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>可清除</Text>
              <Cascader options={options} defaultValue={['jiangsu', 'nanjing', 'xuanwu']} allowClear style={{ width: '100%' }} />
            </Space>
          </div>
        </Illus>

        <h3>3.6 视觉规范与形态选择</h3>
        <ul>
          <li><strong>形态变体</strong>：支持 <code>outlined</code>、<code>filled</code>、<code>borderless</code>，与同页其它输入类控件统一。</li>
          <li><strong>回填展示</strong>：路径过长时可通过省略、tooltip 展示完整路径；多选时标签数量可限制，超出部分折叠。</li>
          <li><strong>浮层层级</strong>：确保浮层不被其它元素遮挡，z-index 与弹窗、抽屉等协调。</li>
        </ul>
        <Illus>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>Outlined（默认）</Text>
              <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} variant="outlined" style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>Filled</Text>
              <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} variant="filled" style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>Borderless</Text>
              <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} variant="borderless" style={{ width: '100%' }} />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>多选标签折叠</Text>
              <Cascader
                options={options}
                multiple
                defaultValue={[['zhejiang', 'hangzhou', 'xihu'], ['jiangsu', 'nanjing', 'gulou'], ['guangdong', 'shenzhen', 'nanshan']]}
                maxTagCount={2}
                style={{ width: '100%' }}
              />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>自定义回填格式</Text>
              <Cascader
                options={options}
                defaultValue={['zhejiang', 'hangzhou', 'xihu']}
                displayRender={(labels) => labels[labels.length - 1]}
                style={{ width: '100%' }}
              />
            </Space>
            <Space direction="vertical" size={4}>
              <Text type="secondary" style={{ fontSize: 12 }}>大尺寸</Text>
              <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} size="large" style={{ width: '100%' }} />
            </Space>
          </div>
        </Illus>

        <hr className="sep" />

        {/* ======== 4. 常见问题 ======== */}
        <h2>4. 常见问题</h2>

        <div className="faq-item">
          <h4>1. Cascader 和 Select、TreeSelect 的区别？</h4>
          <ul>
            <li><strong>Cascader</strong>：层级数据逐列展开选择，同一浮层完成多级选择；适合省市区、分类等明确层级。</li>
            <li><strong>Select</strong>：扁平选项单选或多选，无层级展开；适合简单列表选择。</li>
            <li><strong>TreeSelect</strong>：树形结构，可展开折叠节点；适合树形数据且需展示完整树结构时使用。</li>
          </ul>
          <Illus>
            <Space size={24}>
              <Space direction="vertical" size={4} align="center">
                <Cascader options={options} placeholder="Cascader" style={{ width: 200 }} />
                <Text type="secondary" style={{ fontSize: 11 }}>级联选择</Text>
              </Space>
              <Space direction="vertical" size={4} align="center">
                <Select placeholder="Select" style={{ width: 200 }} options={[{ value: '1', label: '选项一' }, { value: '2', label: '选项二' }, { value: '3', label: '选项三' }]} />
                <Text type="secondary" style={{ fontSize: 11 }}>普通选择</Text>
              </Space>
            </Space>
          </Illus>
        </div>

        <div className="faq-item">
          <h4>2. 选择即改变和基本单选如何选择？</h4>
          <ul>
            <li><strong>基本单选</strong>：必须选到叶子节点；适用于需要精确到最末级的场景（如详细地址）。</li>
            <li><strong>选择即改变</strong>：任意层级可选；适用于父级本身有意义的场景（如仅选省份、仅选大分类）。</li>
          </ul>
          <Illus>
            <Space size={32}>
              <Space direction="vertical" size={4} align="center">
                <Cascader options={options} defaultValue={['zhejiang', 'hangzhou', 'xihu']} style={{ width: 230 }} disabled />
                <Text type="secondary" style={{ fontSize: 11 }}>基本单选 — 必须选到叶子</Text>
              </Space>
              <Space direction="vertical" size={4} align="center">
                <Cascader options={options} changeOnSelect defaultValue={['zhejiang']} style={{ width: 230 }} disabled />
                <Text type="secondary" style={{ fontSize: 11 }}>选择即改变 — 父级即可</Text>
              </Space>
            </Space>
          </Illus>
        </div>

      </div>
    </ConfigProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
